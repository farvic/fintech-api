services:
  postgres:
    image: postgres:16
    container_name: fintech-postgres
    environment:
      POSTGRES_DB: fintech
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - fintech_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fintech-redis
    ports:
      - "6379:6379"

volumes:
  fintech_pgdata:

name: ci-java
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fintech
          POSTGRES_USER: ${{ secrets.POSTGRES_USERNAME || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'postgres' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fintech"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      POSTGRES_USERNAME: ${{ secrets.POSTGRES_USERNAME || 'postgres' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'postgres' }}
      SECURITY_JWT_SECRET: ${{ secrets.SECURITY_JWT_SECRET || 'ZmFrZS1zZWNyZXQtZm9yLWNpLXRlc3RzLTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run tests
        run: mvn -B test

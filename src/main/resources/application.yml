spring:
  cache:
    type: redis
  datasource:
    url: jdbc:postgresql://localhost:5432/fintech
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false
  flyway:
    enabled: true

security:
  jwt:
    issuer: fintech-api
    expiration-seconds: 3600
    secret: ${SECURITY_JWT_SECRET}
springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080

management:
  endpoints:
    access:
      max-permitted: read-only
    web:
      discovery:
        enabled: true
      exposure:
        include:
          - health
          - metrics
          - caches
  endpoint:
    caches:
      access: read-only
    metrics:
      access: read-only
    health:
      show-details: never
      access: read-only
  metrics:
    enable:
      cache: true

logging:
  level:
    org.springframework.data.redis: DEBUG
    io.lettuce.core: DEBUG

